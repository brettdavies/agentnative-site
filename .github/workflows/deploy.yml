# Production-staging deploy. Every merge to `main` builds the site and
# publishes the Worker + static assets to
# `agentnative-site.<brett-subdomain>.workers.dev`. The Worker's
# staging-host guard (src/worker/headers.ts `isStagingHost`) adds
# `X-Robots-Tag: noindex` on every response whose Host ends with
# `.workers.dev` — see docs/DESIGN.md §3.4 locked decision #4.
#
# Production domain attach is a Brett-only task after `agentnative` v0.1
# ships to crates.io (AGENT.md §Tool-site sequencing). Once the domain is
# purchased, `wrangler.jsonc` gains `route` / `custom_domain` and this
# workflow starts publishing to production too.
#
# Secrets:
#   - `CF_API_TOKEN` — Cloudflare API token with `Workers Scripts:Edit`
#     + `Account:Read` scope.
#   - `CF_ACCOUNT_ID` — Cloudflare account ID. Not a formal secret but
#     kept out of the public repo; wrangler reads it from the
#     `CLOUDFLARE_ACCOUNT_ID` env var.

name: deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

# Opt into Node.js 24 runtime for JS actions before June 2nd, 2026 when
# GitHub forces the switch anyway. Kills the Node 20 deprecation warnings
# and catches any incompatibilities now instead of the day of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: build + wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://agentnative-site.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
