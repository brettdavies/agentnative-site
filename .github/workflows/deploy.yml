# Deploy workflow — two targets, one workflow.
#
# Staging (dev branch):
#   Pushes to `dev` deploy to the `agentnative-site-staging` Worker
#   at `agentnative-site-staging.<subdomain>.workers.dev`. The Worker's
#   staging-host guard (src/worker/headers.ts `isStagingHost`) adds
#   `X-Robots-Tag: noindex` on every *.workers.dev response.
#
# Production (main branch):
#   Pushes to `main` deploy to the `agentnative-site` Worker with
#   the `anc.dev` custom domain attached. Full indexing, no .workers.dev.
#
# Ref: https://developers.cloudflare.com/workers/wrangler/environments/
#
# Secrets:
#   - `CF_API_TOKEN` — Cloudflare API token with `Workers Scripts:Edit`
#     + `Account:Read` scope.
#   - `CF_ACCOUNT_ID` — Cloudflare account ID. Not a formal secret but
#     kept out of the public repo; wrangler reads it from the
#     `CLOUDFLARE_ACCOUNT_ID` env var.

name: deploy

on:
  push:
    branches:
      - main
      - dev
    # Skip deploy when the commit only touches docs that aren't ingested
    # at build time. `content/**` (rendered into the site) is deliberately
    # NOT in this list — content changes must still deploy. `docs/**`
    # covers planning/design/solution docs, and `*.md` matches only
    # root-level .md files (README/AGENTS/RELEASES/CHANGELOG) because the
    # `*` glob doesn't match path separators — `content/*.md` still
    # triggers deploy. `workflow_dispatch` below is unaffected.
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to deploy (branch, tag, or SHA).'
        required: false
        type: string
      environment:
        description: 'Target: staging (workers.dev) or production (anc.dev).'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write

# Opt into Node.js 24 runtime for JS actions before June 2nd, 2026 when
# GitHub forces the switch anyway. Kills the Node 20 deprecation warnings
# and catches any incompatibilities now instead of the day of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  staging:
    name: build + deploy staging
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to staging
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Smoke /api/score (registry-fast-path)
        env:
          ANC_STAGING_ACCESS_CLIENT_ID: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_ID }}
          ANC_STAGING_ACCESS_CLIENT_SECRET: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_SECRET }}
        # Smoke exercises the registry-fast-path only: a curated slug
        # ("ripgrep") short-circuits ahead of the Turnstile + rate-limit
        # gates per the R6 unmetered contract. Gate behaviour, error
        # bounces, and live-sandbox dispatch are covered by unit tests
        # and the opt-in homepage-score-live e2e suite, not this step.
        # The intent here is fast feedback that the staging deploy is
        # serving the response triad — not full pipeline coverage.
        run: |
          set -euo pipefail
          # Edge propagation: a fresh wrangler deploy lands in PoPs over a
          # few seconds. Ten seconds is the empirical floor that survives a
          # cold-cache POP across runs without flaking. Tune up if regional
          # latency starts producing intermittent 404s.
          sleep 10
          # `turnstile_token: "x"` exploits the staging Turnstile test
          # secret (CF always-passes 1x0000…AA) so the smoke does not need
          # a real challenge token. Production uses a real secret and this
          # bypass does not apply — no production smoke step until U10
          # promotes live scoring to anc.dev.
          response="$(curl --silent --show-error --fail-with-body \
            --max-time 30 \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${ANC_STAGING_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${ANC_STAGING_ACCESS_CLIENT_SECRET}" \
            -d '{"input":"ripgrep","turnstile_token":"x"}' \
            https://agentnative-site-staging.brettdavies.workers.dev/api/score)"
          echo "::group::smoke response"
          echo "${response}" | jq .
          echo "::endgroup::"
          # The four-field response triad plus the registry-fast-path kind
          # are the contract. Missing any of these is a deploy-stop signal.
          echo "${response}" | jq --exit-status '
              .scorecard.kind == "registry_hit"
              and (.spec_version | type) == "string"
              and (.site_spec_version | type) == "string"
              and (.anc_version | type) == "string"
              and (.checker_url | type) == "string"
            ' > /dev/null

  production:
    name: build + deploy production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://anc.dev

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to production
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # --env="" tells wrangler explicitly to use the top-level config
          # (the production environment in this repo's multi-env shape).
          # Without it, wrangler 4.x warns about ambiguity even though
          # bare `deploy` does the right thing.
          command: deploy --env=""
