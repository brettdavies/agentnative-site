# Deploy workflow — two targets, one workflow.
#
# Staging (dev branch):
#   Pushes to `dev` deploy to the `agentnative-site-staging` Worker
#   at `agentnative-site-staging.<subdomain>.workers.dev`. The Worker's
#   staging-host guard (src/worker/headers.ts `isStagingHost`) adds
#   `X-Robots-Tag: noindex` on every *.workers.dev response.
#
# Production (main branch):
#   Pushes to `main` deploy to the `agentnative-site` Worker with
#   the `anc.dev` custom domain attached. Full indexing, no .workers.dev.
#
# Ref: https://developers.cloudflare.com/workers/wrangler/environments/
#
# Secrets:
#   - `CF_API_TOKEN` — Cloudflare API token with `Workers Scripts:Edit`
#     + `Account:Read` scope.
#   - `CF_ACCOUNT_ID` — Cloudflare account ID. Not a formal secret but
#     kept out of the public repo; wrangler reads it from the
#     `CLOUDFLARE_ACCOUNT_ID` env var.

name: deploy

on:
  push:
    branches:
      - main
      - dev
    # Skip deploy when the commit only touches docs that aren't ingested
    # at build time. `content/**` (rendered into the site) is deliberately
    # NOT in this list — content changes must still deploy. `docs/**`
    # covers planning/design/solution docs, and `*.md` matches only
    # root-level .md files (README/AGENTS/RELEASES/CHANGELOG) because the
    # `*` glob doesn't match path separators — `content/*.md` still
    # triggers deploy. `workflow_dispatch` below is unaffected.
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to deploy (branch, tag, or SHA).'
        required: false
        type: string
      environment:
        description: 'Target: staging (workers.dev) or production (anc.dev).'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write

# Opt into Node.js 24 runtime for JS actions before June 2nd, 2026 when
# GitHub forces the switch anyway. Kills the Node 20 deprecation warnings
# and catches any incompatibilities now instead of the day of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  staging:
    name: build + deploy staging
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to staging
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Smoke /api/score (registry-fast-path)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_SECRET }}
        run: scripts/smoke-api-score.sh https://agentnative-site-staging.brettdavies.workers.dev

      # Repopulate R2 under the current SPEC_VERSION: a deploy (or a spec
      # bump that rotates every cache key) starts a full board rescore.
      # `curl -sSf` fails the job on any non-2xx, so a missing or wrong
      # secret is a loud deploy failure, not a silent 401.
      - name: Trigger web rescore
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.ANC_STAGING_ACCESS_CLIENT_SECRET }}
          WEB_RESCORE_SECRET: ${{ secrets.ANC_WEB_RESCORE_SECRET }}
        run: |
          curl -sSf -X POST \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -H "x-web-rescore-secret: $WEB_RESCORE_SECRET" \
            https://agentnative-site-staging.brettdavies.workers.dev/api/web-rescore

  production:
    name: build + deploy production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://anc.dev

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to production
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # --env="" tells wrangler explicitly to use the top-level config
          # (the production environment in this repo's multi-env shape).
          # Without it, wrangler 4.x warns about ambiguity even though
          # bare `deploy` does the right thing.
          command: deploy --env=""

      # Same post-deploy rescore as staging; anc.dev is public, so no
      # Access headers. Fails the job loudly on any non-2xx.
      - name: Trigger web rescore
        env:
          WEB_RESCORE_SECRET: ${{ secrets.ANC_WEB_RESCORE_SECRET }}
        run: |
          curl -sSf -X POST \
            -H "x-web-rescore-secret: $WEB_RESCORE_SECRET" \
            https://anc.dev/api/web-rescore
