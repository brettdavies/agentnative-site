# Synthetic availability probe for the skill-distribution producer repo.
#
# Why: /skill.json publishes a clone URL to brettdavies/agentnative-skill.
# If the repo flips visibility, gets renamed, or 404s for any reason, every
# agent following /skill.json fails. The probe runs daily, hits the repo
# via unauthenticated `git ls-remote`, and fails the run on any non-zero
# exit. CI failure shows up in the Actions tab + emails the run owner.
#
# Triggers:
#   schedule           — 13:00 UTC daily (≈ 09:00 ET / 06:00 PT). Matches
#                        the master plan's recommended cadence; close-of-
#                        morning window so failures surface during waking
#                        hours in US business time.
#   workflow_dispatch  — manual run, for seeding a green status post-flip
#                        and for ad-hoc verification.
#
# Pre-cutover note: the producer repo is private until the Unit 5 cutover.
# Until then, scheduled runs are EXPECTED to fail (private repos return
# auth errors over unauthenticated HTTPS). After the public flip, run
# `gh workflow run skill-availability.yml` once to seed a green schedule.
#
# Hard rule: no `continue-on-error: true` anywhere in this file. A soft-fail
# probe silently reverts the gate — fix the cause or remove the test.

name: skill-availability

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-availability
  cancel-in-progress: false

jobs:
  probe:
    name: probe · git ls-remote agentnative-skill
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ls-remote producer repo HEAD
        run: |
          set -euo pipefail
          # Hits the same URL /skill.json advertises. Unauthenticated.
          # `--exit-code` makes the command exit non-zero if HEAD is missing
          # (defense-in-depth — `git ls-remote` itself usually returns zero
          # on success, but `--exit-code` also fires when the output is empty).
          git ls-remote --exit-code https://github.com/brettdavies/agentnative-skill.git HEAD
