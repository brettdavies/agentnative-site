# PR gate — fast, always-on. Runs on every pull request to `main` or
# `dev` and must stay green for merge. Single job, ~30s warm:
#   install → lint → build → unit/regression tests → wrangler dry-run
#
# Heavier browser + lighthouse coverage lives in deep-check.yml on a
# schedule + workflow_dispatch — keeps this gate fast while still catching
# real regressions overnight and on demand.
#
# Actions are SHA-pinned (trailing comment names the tag) per the project's
# supply-chain policy.

name: ci

on:
  pull_request:
    branches:
      - main
      - dev
    # Skip the heavy pipeline when a PR only touches docs that aren't
    # ingested at build time. A companion workflow (ci-stub.yml) mirrors
    # this list with a `paths:` filter and emits the required
    # `lint · build · test · wrangler` check name as a no-op success so
    # the dev/main ruleset gate is still satisfied. The two lists MUST
    # stay in sync — drift creates gaps (no check) or harmless overlap
    # (both workflows fire; both pass). See deploy.yml for the matching
    # filter on the push trigger.
    paths-ignore:
      - 'docs/**'
      - '*.md'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt into Node.js 24 runtime for JS actions ahead of GitHub's 2026-06-02
# hard cutover. Kills the Node 20 deprecation warning on pinned actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUN_VERSION: 1.3.11

jobs:
  gate:
    name: lint · build · test · wrangler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Surfaces the build's WARNINGS_JSON line (scorecard/registry orphan
      # counts) so the downstream annotate-warnings job can post a PR
      # comment. Defaults to "{}" when the line isn't present (e.g. on a
      # main-branch push that bypasses the loadScoredTools warning path).
      warnings: ${{ steps.warnings.outputs.json }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome + markdownlint)
        run: bun run lint

      - name: Typecheck (client + worker)
        run: bun run typecheck

      - name: Build
        run: bun run build | tee /tmp/build.log

      - name: Capture build warnings
        id: warnings
        run: |
          line="$(grep '^WARNINGS_JSON: ' /tmp/build.log | tail -1 | sed 's/^WARNINGS_JSON: //')"
          # Default to empty-object so downstream jq parses cleanly. Avoid
          # bash brace-default `${var:-{\}}` — that form silently appends a
          # trailing `}` when $var is non-empty, producing invalid JSON.
          if [ -z "$line" ]; then line='{}'; fi
          echo "json=$line" >> "$GITHUB_OUTPUT"

      - name: Unit + regression tests
        run: bun test

      - name: Wrangler config + bundle dry-run
        run: bun x wrangler deploy --dry-run

      # Verifies the sandbox image tags pinned in wrangler.jsonc actually
      # exist in the Cloudflare managed registry. Catches the failure
      # mode where a contributor bumps the Dockerfile + pin but forgets
      # `wrangler containers build -p` (the image push). The dry-run
      # above does NOT validate tag existence, so without this guard the
      # failure would surface at deploy time rather than PR time.
      #
      # Pin alignment between env blocks is workflow-aware:
      #   dev-targeting PRs:   pins may diverge (staging-leads-prod
      #                        during the soak-then-promote workflow;
      #                        see RELEASES.md § Sandbox image releases).
      #                        Each pin is verified independently against
      #                        the registry.
      #   main-targeting PRs:  pins MUST be equal (released state).
      #                        The release PR is expected to promote the
      #                        top-level pin to match env.staging before
      #                        merging.
      #
      # Skipped on forks (secrets are unavailable to PRs from forks by
      # default). Same-repo branches always hit it.
      - name: Verify pinned sandbox image exists in CF registry
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          prod_img=$(bun x wrangler deploy --dry-run 2>&1 \
            | grep -oE 'registry\.cloudflare\.com/[^ )]+' | head -1 || true)
          stg_img=$(bun x wrangler deploy --dry-run --env staging 2>&1 \
            | grep -oE 'registry\.cloudflare\.com/[^ )]+' | head -1 || true)

          if [ -z "$prod_img" ] || [ -z "$stg_img" ]; then
            echo "::warning::could not extract image URI from wrangler dry-run; skipping registry probe"
            exit 0
          fi

          prod_tag="${prod_img##*:}"
          stg_tag="${stg_img##*:}"

          # Always: independent registry-existence check on each pinned
          # tag. Allows staging to lead prod during development.
          images=$(bun x wrangler containers images list 2>/dev/null || true)
          fail=0

          if echo "$images" | grep -qE "anc-sandbox[[:space:]]+${prod_tag}\b"; then
            echo "verified: top-level pin anc-sandbox:${prod_tag} is in the CF managed registry"
          else
            echo "::error::top-level pin anc-sandbox:${prod_tag} not found in CF managed registry"
            echo "did you forget: bun x wrangler containers build -p -t anc-sandbox:${prod_tag} docker/sandbox/"
            fail=1
          fi

          if [ "$prod_tag" = "$stg_tag" ]; then
            echo "verified: env.staging pin equals top-level pin (lockstep)"
          elif echo "$images" | grep -qE "anc-sandbox[[:space:]]+${stg_tag}\b"; then
            echo "verified: env.staging pin anc-sandbox:${stg_tag} is in the CF managed registry"
          else
            echo "::error::env.staging pin anc-sandbox:${stg_tag} not found in CF managed registry"
            echo "did you forget: bun x wrangler containers build -p -t anc-sandbox:${stg_tag} docker/sandbox/"
            fail=1
          fi

          # Release-time invariant: main-targeting PRs must have aligned
          # pins. Dev-targeting PRs may have divergent pins (staging
          # leads prod during development).
          if [ "${BASE_REF}" = "main" ] && [ "$prod_tag" != "$stg_tag" ]; then
            echo "::error::release PR to main has divergent image pins"
            echo "  top-level:   anc-sandbox:${prod_tag}"
            echo "  env.staging: anc-sandbox:${stg_tag}"
            echo "Promote the top-level pin to match env.staging before merging."
            echo "See RELEASES.md § Sandbox image releases for the soak-and-promote procedure."
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

  annotate-warnings:
    # Surfaces scorecard/registry orphan counts (U8) as a PR comment so
    # reviewers see drift without grepping CI logs. Build still passes
    # — the comment is informational, the warning itself is the gate.
    name: annotate scorecard/registry warnings
    needs: gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Post or update PR annotation
        env:
          WARNINGS_JSON: ${{ needs.gate.outputs.warnings }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MARKER: '<!-- ANC-SCORECARD-WARNINGS -->'
        run: |
          set -euo pipefail

          # Default to empty object if upstream output was missing.
          # Avoid bash brace-default `${var:-{\}}` — it appends a stray `}`
          # to non-empty values, which is exactly what made jq parse-fail
          # on the first attempt.
          warnings_json="$WARNINGS_JSON"
          if [ -z "$warnings_json" ]; then warnings_json='{}'; fi

          scorecard_orphans="$(echo "$warnings_json" | jq -r '.scorecardOrphans // [] | length')"
          registry_orphans="$(echo "$warnings_json" | jq -r '.registryOrphans // [] | length')"

          # Find any prior annotation comment from a previous run on this PR.
          existing_ids="$(
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$MARKER\")) | .id"
          )"

          # Clean PR — drop any stale comment from a previous run and exit.
          if [ "$scorecard_orphans" = "0" ] && [ "$registry_orphans" = "0" ]; then
            for id in $existing_ids; do
              gh api -X DELETE "repos/$REPO/issues/comments/$id"
            done
            echo "no orphans; clean PR."
            exit 0
          fi

          # Build the comment body. Bullets only when the side has entries.
          {
            echo "$MARKER"
            echo
            echo "⚠️ **Scorecard / registry drift in this PR**"
            echo
            if [ "$scorecard_orphans" -gt 0 ]; then
              echo "**Scorecards missing a registry entry** (excluded from leaderboard until the editorial PR lands):"
              echo "$warnings_json" | jq -r '.scorecardOrphans[] | "- `" + . + "`"'
              echo
            fi
            if [ "$registry_orphans" -gt 0 ]; then
              echo "**Registry entries missing a scorecard** (excluded until the scorecard PR lands):"
              echo "$warnings_json" | jq -r '.registryOrphans[] | "- `" + . + "`"'
              echo
            fi
            echo "Both directions are warnings, not errors — the build still passes. Land the matching PR or remove the orphan to clear."
          } > /tmp/comment.md

          # Idempotent: replace any prior comment from a previous run, then post fresh.
          for id in $existing_ids; do
            gh api -X DELETE "repos/$REPO/issues/comments/$id"
          done
          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
