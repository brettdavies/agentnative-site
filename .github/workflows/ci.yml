# PR gate. Every pull request to `main` or `dev` runs this workflow end-
# to-end. Same pipeline every milestone PR used locally — same commands,
# same versions — so the gap between "green locally" and "green in CI"
# stays narrow.
#
# Actions are SHA-pinned (trailing comment names the tag) per the
# project's supply-chain policy (CLAUDE.md "SHA pins, never version/tag
# pins"). Bump by resolving the new commit SHA via
# `gh api repos/<owner>/<repo>/commits/<tag> --jq .sha` and updating the
# trailing comment.

name: ci

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint · build · test · e2e · lhci · wrangler dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome + markdownlint)
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit + regression tests
        run: bun test

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium webkit

      - name: End-to-end tests (Playwright)
        run: bun run test:e2e

      - name: Lighthouse CI
        run: bun x @lhci/cli autorun
        continue-on-error: true
        # Lighthouse depends on network + Chrome launch reliability; a flaky
        # failure should not block a PR while we dial the budgets. Flip to
        # hard-fail once the first few runs are stable.

      - name: Wrangler config + bundle dry-run
        run: bun x wrangler deploy --dry-run

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
