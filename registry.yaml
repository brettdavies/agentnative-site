# ANC 100 — Agent-Native CLI Tool Registry
#
# Single source of truth for tool metadata. The build pipeline reads this
# file to generate the leaderboard and per-tool scorecard pages. Tool names
# must match /^[a-z0-9-]+$/ — they become URL slugs (/score/<name>).
#
# Fields (required):
#   name        — URL-safe identifier (lowercase, alphanumeric, hyphens)
#   binary      — executable name resolved from PATH
#   language    — primary implementation language
#   tier        — workhorse | agent | notable
#   creator     — person or org attribution
#   install     — package manager install command (or distribution note)
#   description — one-line summary
#
# Fields (at least one required — identifies the project):
#   repo        — GitHub owner/repo (used for scorecard links)
#   url         — canonical project URL (for non-GitHub tools, or
#                 supplementary homepage). Falls back to this when
#                 repo is absent.
#
# Fields (scored tools only — omit for unscored):
#   version     — version string scored against
#   scored_at   — ISO 8601 date of last scoring run
#
# Scorecard file naming convention:
#
#   Behavioral + project checks:
#     scorecards/{name}-v{version}.json
#     e.g. scorecards/gh-v2.74.0.json
#     Keyed to a binary release. The build constructs this filename from
#     the registry's name + version fields. No version → no scorecard.
#
#   Source checks (future — not yet implemented):
#     scorecards/{name}-src-{YYYYMMDD}-{branch}-{commit7}.json
#     e.g. scorecards/ripgrep-src-20260417-main-a1b2c3d.json
#     Keyed to repo state. CalVer date provides chronological ordering,
#     branch disambiguates main from feature branches, 7-char SHA pins
#     to exact commit. Displayed as a separate bonus column per R5.
#
# Tier counts: workhorse ~50, agent ~10, notable ~20.
# Per-creator cap in notable: 3-4 tools max.

