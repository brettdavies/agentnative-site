# Curated web leaderboard seed: the domain list only. The web board is
# curated, not auto-populated from arbitrary audited URLs. Scores live in
# R2 and refresh via the weekly rescore Workflow, the post-deploy hook,
# and on-demand audits of seeded domains; nothing is committed here
# beyond the list itself.
#
# The list is dynamic: the rescore Workflow selects the stalest domains in
# bounded batches and cycles until the whole list is refreshed, so adding
# rows never has to respect a per-run size budget. Each row is audited at
# its canonical host (redirecting aliases are resolved to the host an agent
# actually reaches; a callout notes where the browser homepage redirects).
#
# `name` is the board's friendly display label, shown as "<domain> (<name>)";
# omit it and the label is just the domain. To add an entry: add a row below
# and merge. The next rescore (deploy hook or weekly cron) scores it onto the
# board; to see it immediately, trigger POST /api/web-rescore per
# docs/runbooks/web-audit-operations.md.

