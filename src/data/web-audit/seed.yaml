# Curated web leaderboard seed (plan U10, KTD-8). The web board is
# curated, not auto-populated from arbitrary audited URLs: each entry here
# has a committed web scorecard at scorecards/web/<domain>.json (a real
# audit snapshot), rendered as a build-time static page independent of R2.
