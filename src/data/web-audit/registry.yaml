# Web-audit check registry — the single in-repo source (STAR) for every
# check the in-Worker website agent-readiness audit runs.
#
# Vendored from the agent-web-audit skill's checks/registry.yaml and
# extended with a `principle` (P1-P8) field per check. The build step
# (src/build/13-web-audit-registry.mjs) normalizes this file to
# dist/_internal/web-audit-registry.json and derives each check's
# `keyword` mechanically from `tier` (required->must, recommended->should,
# optional->may); hand-authoring a `keyword` here aborts the build.
#
# Handlers (implemented in src/worker/audit-web/handlers/):
#   http           general request + assertions (status / headers / content-type / body regex)
#   cors-preflight OPTIONS preflight; passes on 200/204 with Access-Control-Allow-Origin
#   mcp            JSON-RPC over the discovered endpoint (op: initialize | tools-list | error)
#   dns-doh        DNS-over-HTTPS (JSON API) record lookup
#
# Fields:
#   id         stable slug, also the remediation-doc key
#   category   internal grouping label (display taxonomy is `principle`)
#   tier       required | recommended | optional   (keyword source)
#   principle  P1-P8 display group on the anc scorecard (tunable registry data)
#   applies_to any | docs-site | mcp-present        (mcp-present gates to n_a without an endpoint)
#   weight     integer contribution to the credit-weighted score
#   handler    one of the handlers above
#   with       handler parameters
#   hint       one-line remediation summary; full prose in content/remediation/web/<id>.md

version: 1

# Endpoint discovery: first candidate that answers `initialize` wins.
mcp_discovery:
  well_known:
    - /.well-known/mcp.json
    - /.well-known/mcp/server-card.json
  common_paths:
    - /mcp
    - /sse
    - /message
  protocol_version: "2025-06-18"

categories:
  mcp-protocol: MCP server shape and JSON-RPC conformance
  mcp-discovery: MCP discoverability (well-known cards, usage docs)
  agent-discovery: Non-MCP agent-discovery surfaces (Link headers, A2A card, agent-skills, API catalog, DNS-AID)
  auth-discovery: Agent auth discovery (OAuth/OIDC metadata, protected-resource metadata)
  content-surface: Machine-readable content surface (llms.txt, OpenAPI, schemas)
  html-affordances: Root-HTML agent affordances (meta, link rel, noscript, semantics)
  crawl-policy: Crawl, AI-bot, and content-signal policy

checks:
  # ---- mcp-protocol -------------------------------------------------------
  - id: mcp-initialize
    category: mcp-protocol
    tier: required
    principle: P2
    applies_to: mcp-present
    weight: 5
    title: initialize handshake returns serverInfo + protocolVersion
    handler: mcp
    with: { op: initialize }
    hint: Answer JSON-RPC `initialize` with serverInfo{name,version} and protocolVersion.

  - id: mcp-capabilities
    category: mcp-protocol
    tier: recommended
    principle: P2
    applies_to: mcp-present
    weight: 2
    title: initialize advertises capabilities (tools / resources / prompts)
    handler: mcp
    with: { op: initialize, assert: capabilities }
    hint: Populate `capabilities` in the initialize result so clients gate feature use.

  - id: mcp-tools-list
    category: mcp-protocol
    tier: required
    principle: P2
    applies_to: mcp-present
    weight: 4
    title: tools/list returns a tools array with input schemas
    handler: mcp
    with: { op: tools-list }
    hint: Return `result.tools[]`, each with `name`, `description`, and a JSON `inputSchema`.

  - id: mcp-unknown-method
    category: mcp-protocol
    tier: recommended
    principle: P4
    applies_to: mcp-present
    weight: 2
    title: unknown JSON-RPC method returns -32601
    handler: mcp
    with: { op: error, method: nonexistent/method, expect_code: -32601 }
    hint: Reject unknown methods with JSON-RPC error -32601 (Method not found), not a hang or 500.

  - id: mcp-get-fast-fail
    category: mcp-protocol
    tier: recommended
    principle: P4
    applies_to: mcp-present
    weight: 3
    title: GET on the MCP endpoint fast-fails (not a held-open hang)
    handler: http
    with:
      path: "{mcp_endpoint}"
      method: GET
      timeout: 8
      expect: { status: [405, 400, 404, 406] }
    hint: Guard non-POST verbs to return 405 fast; a stateless streamable-HTTP GET otherwise hangs open.

  - id: mcp-cors-preflight
    category: mcp-protocol
    tier: recommended
    principle: P6
    applies_to: mcp-present
    weight: 3
    title: CORS preflight (OPTIONS) succeeds with Access-Control-Allow-* headers
    handler: cors-preflight
    with:
      path: "{mcp_endpoint}"
      origin: https://example.com
      request_method: POST
      request_headers: content-type
    hint: Answer OPTIONS with 204 + Access-Control-Allow-Origin/Methods/Headers so browser-origin agents work.

  - id: mcp-cors-actual
    category: mcp-protocol
    tier: recommended
    principle: P6
    applies_to: mcp-present
    weight: 2
    title: POST response carries Access-Control-Allow-Origin
    handler: mcp
    with: { op: tools-list, origin: https://example.com, assert: cors }
    hint: Echo Access-Control-Allow-Origin on the actual POST, not only the preflight.

  # ---- mcp-discovery ------------------------------------------------------
  - id: well-known-mcp-card
    category: mcp-discovery
    tier: recommended
    principle: P8
    applies_to: mcp-present
    weight: 3
    title: A .well-known MCP server card is published (SEP-1649)
    handler: http
    with:
      path_any: [/.well-known/mcp/server-card.json, /.well-known/mcp/server-cards.json, /.well-known/mcp.json]
      expect: { status: [200], content_type: "json", body_regex: "mcp_endpoint|serverInfo|transport|\"name\"" }
    hint: Publish /.well-known/mcp/server-card.json (SEP-1649) naming the endpoint, transport, and capabilities.

  - id: mcp-usage-doc
    category: mcp-discovery
    tier: optional
    principle: P8
    applies_to: mcp-present
    weight: 1
    title: A human/agent usage doc for the server resolves
    handler: http
    with:
      path_any: [/mcp-skill.md, /mcp.md, /.well-known/mcp/usage.md]
      expect: { status: [200] }
    hint: Link a short markdown usage doc (curl examples, tool list, auth, rate limits) from the card and llms.txt.

  # ---- content-surface ----------------------------------------------------
  - id: llms-txt
    category: content-surface
    tier: recommended
    principle: P2
    applies_to: any
    weight: 4
    title: /llms.txt present with a summary and link index
    handler: http
    with:
      path: /llms.txt
      expect: { status: [200], body_regex: "^#|\\]\\(https?://" }
    hint: 'Serve /llms.txt (llmstxt.org): H1 title, summary blockquote, categorized link index.'

  - id: llms-full-txt
    category: content-surface
    tier: optional
    principle: P2
    applies_to: docs-site
    weight: 2
    title: /llms-full.txt present (single-fetch full corpus)
    handler: http
    with:
      path: /llms-full.txt
      expect: { status: [200] }
    hint: For docs sites, concatenate every page as markdown at /llms-full.txt for one-fetch ingestion.

  - id: openapi
    category: content-surface
    tier: recommended
    principle: P2
    applies_to: any
    weight: 2
    title: An OpenAPI description is published
    handler: http
    with:
      path_any: [/openapi.json, /openapi.yaml, /.well-known/openapi.json]
      expect: { status: [200], body_regex: "openapi|swagger" }
    hint: Publish an OpenAPI 3.1 description for the REST surface so non-MCP agents can call it.

  - id: json-schemas
    category: content-surface
    tier: optional
    principle: P2
    applies_to: any
    weight: 1
    title: Referenced JSON Schemas resolve as application/schema+json
    handler: http
    with:
      path_any: [/api/schema/input.json, /api/schema/output.json, /schema.json]
      expect: { status: [200], content_type: "json" }
    hint: Serve input/output JSON Schemas so agents can validate payloads before calling.

  - id: accept-markdown
    category: content-surface
    tier: optional
    principle: P2
    applies_to: docs-site
    weight: 2
    title: Accept text/markdown content negotiation returns markdown
    handler: http
    with:
      path: /
      headers: { Accept: text/markdown }
      expect: { content_type: "markdown|text/plain" }
    hint: 'Honor `Accept: text/markdown` on content URLs; return raw markdown, not HTML chrome.'

  # ---- html-affordances ---------------------------------------------------
  - id: root-meta-description
    category: html-affordances
    tier: recommended
    principle: P3
    applies_to: any
    weight: 2
    title: Root HTML has a descriptive <meta name="description">
    handler: http
    with:
      path: /
      expect: { body_regex: "<meta[^>]+name=[\"']description[\"']" }
    hint: Add a meta description that states what the service does and names its agent entry points.

  - id: root-link-rel
    category: html-affordances
    tier: recommended
    principle: P3
    applies_to: any
    weight: 3
    title: Root HTML links to machine surfaces via <link rel>
    handler: http
    with:
      path: /
      expect: { body_regex: "rel=[\"'](service-desc|service-doc|alternate)[\"']" }
    hint: Add <link rel="service-desc" href="/openapi.json">, service-doc, and alternate to llms.txt / mcp card.

  - id: noscript-fallback
    category: html-affordances
    tier: recommended
    principle: P1
    applies_to: any
    weight: 2
    title: Root HTML has a <noscript> with machine entry points
    handler: http
    with:
      path: /
      expect: { body_regex: "<noscript" }
    hint: Ship a <noscript> block listing /llms.txt, /openapi.json, and the MCP endpoint for non-JS agents.

  - id: schema-org-jsonld
    category: html-affordances
    tier: optional
    principle: P2
    applies_to: any
    weight: 1
    title: Root HTML embeds Schema.org JSON-LD
    handler: http
    with:
      path: /
      expect: { body_regex: "application/ld\\+json" }
    hint: Embed Schema.org JSON-LD (e.g. TechArticle / WebAPI) in <head> for structured metadata.

  - id: semantic-html
    category: html-affordances
    tier: optional
    principle: P3
    applies_to: any
    weight: 1
    title: Root HTML uses semantic landmarks
    handler: http
    with:
      path: /
      expect: { body_regex: "<(main|article|section|nav)\\b" }
    hint: Use <main>/<article>/<section>/<nav> landmarks; the HTML path should be parseable too.

  # ---- crawl-policy -------------------------------------------------------
  - id: robots
    category: crawl-policy
    tier: recommended
    principle: P7
    applies_to: any
    weight: 2
    title: /robots.txt present
    handler: http
    with:
      path: /robots.txt
      expect: { status: [200] }
    hint: Publish robots.txt; declare content-signal / AI-usage policy explicitly rather than by omission.

  - id: sitemap
    category: crawl-policy
    tier: optional
    principle: P7
    applies_to: any
    weight: 1
    title: /sitemap.xml present
    handler: http
    with:
      path: /sitemap.xml
      expect: { status: [200] }
    hint: Publish sitemap.xml so crawlers and agents can enumerate content URLs.

  - id: robots-ai-rules
    category: crawl-policy
    tier: recommended
    principle: P7
    applies_to: any
    weight: 2
    title: robots.txt declares AI-crawler rules (RFC 9309)
    handler: http
    with:
      path: /robots.txt
      expect: { status: [200], body_regex: "^\\s*User-agent:\\s*(\\*|GPTBot|OAI-SearchBot|ChatGPT-User|Claude|ClaudeBot|Anthropic|Google-Extended|PerplexityBot|CCBot|Bytespider)" }
    hint: Add explicit User-agent rules for AI crawlers (GPTBot, ClaudeBot, Google-Extended, ...) or a wildcard policy.

  - id: content-signals
    category: crawl-policy
    tier: recommended
    principle: P7
    applies_to: any
    weight: 2
    title: robots.txt declares Content-Signal AI-usage preferences
    handler: http
    with:
      path: /robots.txt
      expect: { status: [200], body_regex: "^\\s*Content-Signal:\\s*(ai-train|search|ai-input)" }
    hint: 'Add Content-Signal directives to robots.txt: ai-train / search / ai-input = yes|no (contentsignals.org).'

  - id: security-txt
    category: crawl-policy
    tier: optional
    principle: P4
    applies_to: any
    weight: 1
    title: /.well-known/security.txt present (RFC 9116)
    handler: http
    with:
      path: /.well-known/security.txt
      expect: { status: [200], body_regex: "Contact:" }
    hint: Publish /.well-known/security.txt (RFC 9116) with a Contact and Expires field.

  - id: web-bot-auth
    category: crawl-policy
    tier: optional
    principle: P6
    applies_to: any
    weight: 1
    title: Web Bot Auth signature directory present (informational)
    handler: http
    with:
      path: /.well-known/http-message-signatures-directory
      expect: { status: [200], body_regex: "keys|jwk" }
    hint: Informational only. Publish an HTTP Message Signatures JWKS directory only if the site sends authenticated bot traffic.

  # ---- agent-discovery ----------------------------------------------------
  - id: link-headers
    category: agent-discovery
    tier: recommended
    principle: P3
    applies_to: any
    weight: 3
    title: Homepage sends RFC 8288 Link headers pointing at agent resources
    handler: http
    with:
      path: /
      expect:
        header_regex: { name: link, pattern: "rel=\"?(service-desc|describedby|api-catalog|service-doc)\"?" }
    hint: Add Link response headers on / with rel=service-desc / describedby / api-catalog pointing at machine surfaces.

  - id: api-catalog
    category: agent-discovery
    tier: optional
    principle: P8
    applies_to: any
    weight: 2
    title: /.well-known/api-catalog published (RFC 9727)
    handler: http
    with:
      path: /.well-known/api-catalog
      expect: { status: [200], body_regex: "linkset" }
    hint: Serve /.well-known/api-catalog as application/linkset+json with a linkset[] of anchor + service-desc entries.

  - id: a2a-agent-card
    category: agent-discovery
    tier: optional
    principle: P8
    applies_to: any
    weight: 2
    title: A2A Agent Card published for agent-to-agent discovery
    handler: http
    with:
      path_any: [/.well-known/agent-card.json, /.well-known/agent.json]
      expect: { status: [200], content_type: "json", body_regex: "\"name\"|supportedInterfaces|skills" }
    hint: Serve /.well-known/agent-card.json (a2a-protocol.org) with name, version, and supportedInterfaces.

  - id: agent-skills
    category: agent-discovery
    tier: optional
    principle: P8
    applies_to: any
    weight: 2
    title: Agent-skills discovery index published
    handler: http
    with:
      path_any: [/.well-known/agent-skills/index.json, /.well-known/skills/index.json]
      expect: { status: [200], content_type: "json", body_regex: "skills" }
    hint: Publish /.well-known/agent-skills/index.json (Cloudflare agent-skills-discovery RFC) with a skills[] array.

  - id: dns-aid
    category: agent-discovery
    tier: optional
    principle: P8
    applies_to: any
    weight: 1
    title: DNS for AI Discovery (DNS-AID) records under _agents (IETF draft)
    handler: dns-doh
    with:
      names: ["_index._agents.{host}", "_a2a._agents.{host}", "_mcp._agents.{host}"]
      type: SVCB
    hint: Publish SVCB/HTTPS records under _agents (e.g. _index._agents.<domain>), DNSSEC-signed (draft-mozleywilliams-dnsop-dnsaid).

  # ---- auth-discovery -----------------------------------------------------
  - id: oauth-discovery
    category: auth-discovery
    tier: optional
    principle: P1
    applies_to: any
    weight: 1
    title: OAuth/OIDC discovery metadata published
    handler: http
    with:
      path_any: [/.well-known/openid-configuration, /.well-known/oauth-authorization-server]
      expect: { status: [200], content_type: "json", body_regex: "issuer|authorization_endpoint|token_endpoint" }
    hint: Publish OAuth/OIDC discovery (RFC 8414 / OIDC Discovery) if agents authenticate; expected absent for open servers.

  - id: oauth-protected-resource
    category: auth-discovery
    tier: optional
    principle: P1
    applies_to: any
    weight: 1
    title: OAuth Protected Resource Metadata published (RFC 9728)
    handler: http
    with:
      path: /.well-known/oauth-protected-resource
      expect: { status: [200], content_type: "json", body_regex: "authorization_servers|resource" }
    hint: For an authenticated MCP server, publish /.well-known/oauth-protected-resource (RFC 9728); expected absent for open servers.
