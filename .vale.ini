StylesPath = styles
MinAlertLevel = warning
Vocab = brand, site
Packages = https://github.com/vale-cli/write-good/releases/download/v0.4.1/write-good.zip, https://github.com/vale-cli/proselint/releases/download/v0.3.4/proselint.zip

[*.md]
BasedOnStyles = Vale, brand, site, write-good, proselint
Vale.Terms = NO
brand.MarketingRegister = error
brand.HedgeWords = error
brand.FillerAdjectives = error
site.BannedFonts = error
site.BannedAesthetics = error
write-good.E-Prime = NO
write-good.Passive = warning
write-good.TooWordy = warning
write-good.ThereIs = warning
proselint.But = NO
proselint.Annotations = NO
proselint.Typography = warning

[{docs/brainstorms,docs/plans,docs/research}/**]
BasedOnStyles =

[AGENTS.md]
BasedOnStyles =

[CHANGELOG.md]
BasedOnStyles =

# .impeccable.md is the channel's policy doc — it names the banned aesthetic
# patterns the rule pack catches. Disable site.BannedAesthetics here only
# (the rule fires on the policy doc that defines it).
[.impeccable.md]
site.BannedAesthetics = NO

# docs/DESIGN.md is the rationale doc that records why specific fonts were
# rejected (Inter, IBM Plex, Fraunces, Space Grotesk, Instrument Serif).
# Same precedent as the .impeccable.md self-reference: the doc that names
# what was rejected legitimately enumerates the rejected names.
[docs/DESIGN.md]
site.BannedFonts = NO
