<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>anc.dev OG card</title>
  <meta name="viewport" content="width=1200,initial-scale=1">
  <meta name="description" content="Production source-of-truth for the anc.dev social card. Rendered to public/og-image.png via scripts/og/generate.ts.">
  <link rel="stylesheet" href="../../src/styles/foundation.css">
  <link rel="stylesheet" href="./og.css">
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand__domain">anc.dev</span>
      <span class="brand__rule" aria-hidden="true"></span>
      <span class="brand__tag">the agent-native standard</span>
      <span class="brand__meter" aria-hidden="true">
        <span class="brand__meter-track"><span class="brand__meter-fill"></span></span>
        <span class="brand__meter-num">100</span>
      </span>
    </div>

    <div class="manifesto">
      <p><span class="kw must">MUST</span>run without prompting.</p>
      <p><span class="kw should">SHOULD</span>speak machine-first.</p>
      <p><span class="kw may">MAY</span>decorate when a TTY is open.</p>
    </div>

    <div class="foot">
      <span class="foot__cite">one bar for agent-readiness, on two surfaces</span>
      <span class="foot__version" data-version>v0.1.0</span>
    </div>
  </div>
</body>
</html>
