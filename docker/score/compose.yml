# Compose file for the anc100 batch-scoring image.
#
# Run from repo root:
#   docker compose -f docker/score/compose.yml build
#   docker compose -f docker/score/compose.yml run --rm scorer
#
# The wrapper at docker/score/build.sh does both. The image brew-installs
# the latest `anc` from `brettdavies/tap/agentnative` at build time (see
# Dockerfile §"The anc binary"). No local CLI checkout, no cargo build.
#
# GPU passthrough notes:
#   The compose file declares NVIDIA GPU access so `nvidia-smi` (one of
#   the registry tools) can resolve and score inside the container. The
#   host needs:
#     - NVIDIA driver installed (host-side, not in image)
#     - nvidia-container-toolkit installed and configured
#       (`sudo nvidia-ctk runtime configure --runtime=docker`)
#   Without those, `runtime: nvidia` will fail or fall back. The runner
#   handles a missing nvidia-smi as `install-missing` and proceeds with
#   the other 99 tools.

services:
  scorer:
    build:
      context: ../..
      dockerfile: docker/score/Dockerfile
      args:
        # Selects how anc lands in the image: `brew` (default) installs from
        # brettdavies/tap/agentnative; `inject` copies docker/score/inject/anc
        # in instead, skipping brew. The wrapper (docker/score/build.sh
        # --from-source <cli-repo>) toggles this via the ANC_SOURCE env var.
        ANC_SOURCE: ${ANC_SOURCE:-brew}
    image: anc-scorer:latest
    container_name: anc-scorer

    # Bind-mounts: read the host's registry, write scorecards back to host.
    # docker/score/ is mounted read-only at /work/scripts/ so any helper
    # script (audit-version-extract.sh, etc.) is invokable without an image
    # rebuild — just `docker compose run --rm scorer bash /work/scripts/<name>.sh`.
    volumes:
      - ../../registry.yaml:/work/registry.yaml:ro
      - ../../scorecards:/work/scorecards
      - ../../docker/score/out:/work/out
      - ../../docker/score:/work/scripts:ro

    # NVIDIA GPU passthrough so nvidia-smi has something to query.
    # Modern compose syntax (v1.28+); the legacy `runtime: nvidia` is also
    # accepted by the nvidia-container-toolkit but is deprecated.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Default entrypoint runs the batch scorer. Override with
    # `docker compose run --rm scorer bash` for an interactive shell.
    command: ["/work/score-anc100.sh"]
